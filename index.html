<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎸 מאמן תווים לגיטרה</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap');
  

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Heebo', 'Segoe UI', Arial, sans-serif;
    background: #ffffff;
    color: #2a2520;
    direction: rtl;
  }

  h1 {
    font-size: 1.8em;
    font-weight: 900;
    color: #f5a623;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
    text-align: center;
  }
  .tagline { color: #8a8078; font-size: 0.9em; margin-bottom: 28px; text-align: center; }

  #app {
    width: 100%;
    max-width: 840px;
    margin: 0 auto;
    padding: 24px 16px 40px;
  }

  #level-screen h2 {
    text-align: center;
    margin-bottom: 20px;
    font-size: 1.1em;
    color: #8a8078;
    font-weight: 400;
  }
  .level-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  .lvl-btn {
    background: #ffffff;
    border: 1.5px solid #e8e2d8;
    color: #2a2520;
    padding: 20px 12px;
    border-radius: 12px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
    text-align: center;
    line-height: 1.5;
  }
  .lvl-btn:hover {
    background: rgba(245,166,35,0.06);
    border-color: #f5a623;
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(245,166,35,0.15);
  }
  .lvl-btn .sname { font-size: 1.2em; font-weight: 700; color: #f5a623; display: block; }
  .lvl-btn .sdesc { font-size: 0.82em; color: #8a8078; }
  .lvl-btn.all-btn {
    grid-column: 1 / -1;
    padding: 16px;
    background: rgba(245,166,35,0.05);
    border-color: rgba(245,166,35,0.35);
  }
  .lvl-btn.all-btn .sname { font-size: 1.1em; }
  .lvl-btn.all-btn:hover { background: rgba(245,166,35,0.1); }
  .lvl-btn.locked {
    opacity: 0.38;
    cursor: not-allowed;
    pointer-events: none;
    background: #f5f3ef;
    border-style: dashed;
  }
  .lvl-btn.locked .sname { color: #b0a898; }
  .lock-icon { font-size: 0.85em; }


  #game-screen { display: none; }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .back-btn {
    background: none;
    border: 1.5px solid #e8e2d8;
    color: #8a8078;
    padding: 8px 18px;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.9em;
    transition: all 0.2s;
  }
  .back-btn:hover { border-color: #f5a623; color: #c97d0a; }

  .score-box { font-size: 0.9em; color: #8a8078; text-align: center; }
  .score-box b { color: #f5a623; }
  #level-label { font-size: 0.95em; color: #f5a623; font-weight: 700; }

  .prompt-card {
    background: #faf8f4;
    border: 1.5px solid #e8e2d8;
    border-radius: 14px;
    padding: 24px 20px 18px;
    text-align: center;
    margin-bottom: 12px;
    position: relative;
  }
  .prompt-label { color: #8a8078; font-size: 0.95em; margin-bottom: 6px; }
  #target-fret {
    font-size: 0.75em;
    color: #8a8078;
    font-weight: 400;
    letter-spacing: 0.5px;
    margin-top: 2px;
    height: 18px;
  }

  #target-note {
    font-size: 5em;
    font-weight: 900;
    color: #f5a623;
    line-height: 1;
    letter-spacing: -2px;
    transition: all 0.3s;
  }

  .prompt-body {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 28px;
    margin: 10px 0 4px;
  }

  #detected-display {
    margin-top: 8px;
    height: 22px;
    font-size: 0.9em;
    color: #8a8078;
  }

  #feedback-zone {
    text-align: center;
    min-height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 10px;
  }
  #feedback-msg { font-size: 1.5em; font-weight: 700; transition: all 0.3s; }
  .fb-ok  { color: #3d8c40; }
  .fb-bad { color: #c0392b; }

  #fretboard-wrap {
    background: #f0ece4;
    border: 1.5px solid #e8e2d8;
    border-radius: 12px;
    padding: 16px 8px 22px;
    margin-bottom: 14px;
    overflow-x: auto;
    direction: ltr;
  }
  #fb { display: block; margin: 0 auto; }

  .meter-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }
  .meter-label { font-size: 0.78em; color: #8a8078; white-space: nowrap; }
  .meter-track {
    flex: 1;
    height: 6px;
    background: #e8e2d8;
    border-radius: 3px;
    overflow: hidden;
  }
  #vol-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #3d8c40, #6abf6e);
    border-radius: 3px;
    transition: width 0.08s;
  }

  #mic-btn {
    display: block;
    margin: 0 auto;
    padding: 14px 44px;
    background: #e94560;
    border: none;
    color: white;
    font-size: 1.05em;
    font-family: inherit;
    font-weight: 700;
    border-radius: 30px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 16px rgba(233,69,96,0.2);
  }
  #mic-btn:hover { transform: scale(1.04); box-shadow: 0 6px 22px rgba(233,69,96,0.32); }
  #mic-btn.on {
    background: #3d8c40;
    box-shadow: 0 4px 16px rgba(61,140,64,0.25);
    animation: glow 2s ease-in-out infinite;
  }
  @keyframes glow {
    0%,100% { box-shadow: 0 4px 16px rgba(61,140,64,0.2); }
    50%      { box-shadow: 0 4px 28px rgba(61,140,64,0.5); }
  }

  @keyframes pop {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.25); }
    100% { transform: scale(1); }
  }
  .celebrate { animation: pop 0.4s ease; }

  .mode-toggle {
    display: flex; gap: 10px; justify-content: center; margin-bottom: 20px;
  }
  .mode-btn {
    padding: 9px 26px;
    border: 1.5px solid #e8e2d8;
    background: #ffffff;
    color: #8a8078;
    border-radius: 30px;
    cursor: pointer;
    font-family: inherit;
    font-size: 1em;
    transition: all 0.2s;
  }
  .mode-btn.active {
    background: rgba(245,166,35,0.1);
    border-color: #f5a623;
    color: #c97d0a;
    font-weight: 700;
  }
  .mode-btn:hover { border-color: #f5a623; color: #c97d0a; }

  #game-hud {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #faf8f4;
    border: 1.5px solid #e8e2d8;
    border-radius: 12px;
    padding: 10px 22px;
    margin-bottom: 12px;
  }
  .game-progress { font-size: 1.2em; color: #8a8078; }
  .game-progress b { color: #f5a623; font-size: 1.4em; }
  #timer-wrap { position: relative; width: 64px; height: 64px; }
  #timer-num {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 1.5em;
    font-weight: 900;
    color: #3d8c40;
    transition: color 0.4s;
  }

  #results-screen {
    text-align: center;
    padding: 30px 16px 20px;
    background: #faf8f4;
    border: 1.5px solid #e8e2d8;
    border-radius: 14px;
  }
  #res-emoji { font-size: 4.5em; margin-bottom: 10px; }
  #res-title { color: #f5a623; font-size: 1.8em; margin-bottom: 28px; font-weight: 900; }
  .res-scores {
    display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; flex-wrap: wrap;
  }
  .res-item {
    font-size: 1.1em;
    padding: 18px 30px;
    border-radius: 12px;
    background: #ffffff;
    border: 1.5px solid #e8e2d8;
    color: #2a2520;
  }
  .res-item b { font-size: 1.8em; display: block; margin-top: 4px; }
  .res-item.ok  b { color: #3d8c40; }
  .res-item.bad b { color: #c0392b; }
  .res-of { font-size: 0.8em; color: #8a8078; }
  .res-buttons { display: flex; justify-content: center; gap: 14px; flex-wrap: wrap; }
  .res-btn {
    padding: 12px 32px;
    border-radius: 30px;
    font-family: inherit;
    font-size: 1em;
    cursor: pointer;
    transition: all 0.2s;
    background: #ffffff;
    color: #8a8078;
    border: 1.5px solid #e8e2d8;
  }
  .res-btn.primary {
    background: #f5a623;
    color: #ffffff;
    font-weight: 700;
    border: none;
    box-shadow: 0 4px 14px rgba(245,166,35,0.3);
  }
  .res-btn:hover { transform: scale(1.03); }


  #free-hud {
    display: flex;
    align-items: center;
    background: #faf8f4;
    border: 1.5px solid #e8e2d8;
    border-radius: 12px;
    padding: 10px 22px;
    margin-bottom: 12px;
  }
  #free-progress { font-size: 1.2em; color: #8a8078; }
  #free-progress b { color: #f5a623; font-size: 1.4em; }

  #ordered-hud {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #faf8f4;
    border: 1.5px solid #e8e2d8;
    border-radius: 12px;
    padding: 10px 22px;
    margin-bottom: 12px;
  }
  #ordered-progress { font-size: 1.2em; color: #8a8078; }
  #ordered-progress b { color: #f5a623; font-size: 1.4em; }
  #ordered-dir { font-size: 1.2em; color: #8a8078; }
  #note-display {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
  }
  .prompt-body.layout-basic {
    align-items: center;
    justify-content: flex-start;
    gap: 14px;
  }
  .prompt-body.layout-basic #string-indicator {
    display: block !important;
    order: 1;
    flex: 0 0 145px;
    width: 145px !important;
    height: 100px;
    max-width: none;
  }
  .prompt-body.layout-basic #note-display {
    flex: 1 1 0;
    width: auto;
    order: 2;
  }
  .prompt-body.layout-basic #target-note,
  .prompt-body.layout-basic #target-fret { display: none; }
  #note-name-side {
    font-size: 2.4em;
    font-weight: 700;
    color: #f5a623;
    text-align: center;
    line-height: 1;
    order: 3;
    flex: 0 0 auto;
    min-width: 62px;
  }

  #staff-area {
    background: #faf8f4;
    border: 1.5px solid #e8e2d8;
    border-radius: 12px;
    padding: 10px 8px 6px;
    margin-bottom: 12px;
    text-align: center;
  }
  #staff-svg { width: 100%; height: auto; display: block; margin: 0 auto; }

  #seq-hud {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #faf8f4;
    border: 1.5px solid #e8e2d8;
    border-radius: 12px;
    padding: 10px 22px;
    margin-bottom: 12px;
    gap: 12px;
  }
  #staff-area { overflow-x: auto; }

  @media (max-width: 600px) {
    h1 { font-size: 1.5em; }
    .tagline { margin-bottom: 18px; }
    .level-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .lvl-btn { padding: 14px 8px; }
    .lvl-btn .sname { font-size: 1.05em; }
    .topbar { flex-wrap: wrap; gap: 6px; }
    #level-label { font-size: 0.8em; width: 100%; text-align: center; order: 3; }
    .score-box { font-size: 0.82em; }
    .prompt-card { padding: 14px 10px 12px; }
    .prompt-body { flex-direction: column; gap: 10px; align-items: center; }
    #target-note { font-size: 3.8em; }
    #string-indicator { width: 100% !important; max-width: 340px; }
    #fretboard-wrap { padding: 10px 4px 18px; }
    #game-hud { padding: 8px 14px; }
    .game-progress { font-size: 1em; }
    #timer-wrap { width: 54px; height: 54px; }
    #timer-wrap svg { width: 54px; height: 54px; }
    #timer-num { font-size: 1.2em; }
    #mic-btn { padding: 13px 30px; font-size: 0.95em; }
    .res-scores { gap: 12px; }
    .res-item { padding: 14px 18px; font-size: 1em; }
    #res-title { font-size: 1.4em; }
    #res-emoji { font-size: 3.5em; }
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Noto+Music&display=block" rel="stylesheet">
</head>
<body>

<h1>🎸 מאמן תווים לגיטרה</h1>
<p class="tagline">אימון תווים — בנה את מפת הצוואר שלך</p>

<div id="app">

  <!-- ══ Level Selection ══ -->
  <div id="level-screen">
    <h2>בחר מיתר להתחיל</h2>
    <div class="mode-toggle" id="mode-toggle"></div>
    <div class="level-grid" id="level-grid"></div>
  </div>

  <!-- ══ Game Screen ══ -->
  <div id="game-screen">

    <!-- Sequence HUD -->
    <div id="seq-hud" style="display:none;">
      <div id="seq-title" style="font-size:1em;color:#f5a623;font-weight:700;"></div>
      <div id="seq-progress" style="font-size:1.2em;color:#8a8078;">תו <b id="seq-num">1</b> / <b id="seq-total">—</b></div>
    </div>

    <!-- Ordered HUD -->
    <div id="ordered-hud" style="display:none;">
      <div id="ordered-progress">תו <b id="ordered-num">1</b> / <b id="ordered-total">—</b></div>
      <div id="ordered-dir">↑</div>
    </div>

    <!-- Free HUD -->
    <div id="free-hud" style="display:none;">
      <div id="free-progress">תו <b id="free-num">1</b> / <b>15</b></div>
    </div>

    <!-- Game HUD (shown only in game mode) -->
    <div id="game-hud" style="display:none;">
      <div class="game-progress">תו <b id="note-num">1</b><span style="color:#8a8078"> / 10</span></div>
      <div id="timer-wrap">
        <svg viewBox="0 0 64 64" width="64" height="64">
          <circle cx="32" cy="32" r="27" fill="none" stroke="#e8e2d8" stroke-width="5"/>
          <circle id="timer-arc" cx="32" cy="32" r="27" fill="none" stroke="#3d8c40" stroke-width="5"
            stroke-dasharray="169.6" stroke-dashoffset="0" stroke-linecap="round"
            transform="rotate(-90 32 32)"/>
        </svg>
        <span id="timer-num">10</span>
      </div>
    </div>

    <div class="topbar">
      <button class="back-btn" onclick="backToMenu()">← תפריט</button>
      <div class="score-box">✅ <b id="sc-ok">0</b> &nbsp;|&nbsp; ❌ <b id="sc-bad">0</b></div>
      <div id="level-label"></div>
    </div>

    <div class="prompt-card">
      <div class="prompt-label">נגן את התו:</div>
      <div class="prompt-body">
        <svg id="string-indicator" width="215" height="122"></svg>
        <div id="note-display">
          <div id="target-note">—</div>
          <div id="target-fret"></div>
          <svg id="staff-svg" viewBox="0 0 260 110" style="display:none; width:100%; height:auto; margin:6px auto 0;"></svg>
        </div>
        <div id="note-name-side" style="display:none;"></div>
      </div>
      <div id="detected-display"></div>
    </div>

    <div id="feedback-zone"><div id="feedback-msg"></div></div>

    <div id="fretboard-wrap"><svg id="fb"></svg></div>

    <div class="meter-row">
      <span class="meter-label">🎙️ עוצמה</span>
      <div class="meter-track"><div id="vol-bar"></div></div>
    </div>

    <button id="mic-btn" onclick="toggleMic()">🎤 מיקרופון</button>

  </div>

  <!-- ══ Results Screen ══ -->
  <div id="results-screen" style="display:none;">
    <div id="res-emoji">🌟</div>
    <h2 id="res-title">מושלם!</h2>
    <div class="res-scores">
      <div class="res-item ok">✅ נכון &nbsp;<b id="res-ok">0</b><span class="res-of" id="res-of-ok"></span></div>
      <div class="res-item bad">❌ שגוי &nbsp;<b id="res-bad">0</b><span class="res-of" id="res-of-bad"></span></div>
    </div>
    <div class="res-buttons">
      <button class="res-btn primary" id="res-replay-btn" onclick="replayGame()">🔄 נגן שוב</button>
      <button class="res-btn primary" id="res-next-btn" onclick="goNextExercise()" style="display:none;">← תרגיל הבא</button>
      <button class="res-btn" onclick="backToMenu()">תפריט</button>
    </div>
  </div>

</div>

<script>
// ═══════════════════════════════════════════════
//  URL PARAMS — lesson config
//  Usage: ?strings=1        (string 1 only)
//         ?strings=1,2      (strings 1 and 2)
//         ?strings=all      (all strings — default)
// ═══════════════════════════════════════════════

function parseUnlockedStrings() {
  const params = new URLSearchParams(window.location.search);
  const raw = params.get('strings');
  if (!raw || raw === 'all') return [1,2,3,4,5,6];
  return raw.split(',').map(Number).filter(n => n >= 1 && n <= 6);
}
const UNLOCKED_STRINGS = parseUnlockedStrings();
const NATURALS_ONLY    = new URLSearchParams(window.location.search).get('naturals') === 'true';
const NOTATION         = new URLSearchParams(window.location.search).get('notation') || 'none';
const MAX_FRET_PARAM   = (() => { const v = parseInt(new URLSearchParams(window.location.search).get('maxfret')); return isNaN(v) ? 12 : v; })();


function buildModeToggle() {
  const container = document.getElementById('mode-toggle');
  if (!container) return;
  container.innerHTML = '';

  if (STAGE === 'melody') {
    const randomBtn = document.createElement('button');
    randomBtn.className = 'mode-btn' + (currentSeqMode === 'random' ? ' active' : '');
    randomBtn.id = 'btn-seq-random';
    randomBtn.textContent = '🎲 תיבה אקראית';
    randomBtn.onclick = () => setSeqMode('random');
    container.appendChild(randomBtn);

    MELODIES.forEach(m => {
      const btn = document.createElement('button');
      btn.className = 'mode-btn' + (currentSeqMode === m.id ? ' active' : '');
      btn.id = 'btn-melody-' + m.id;
      btn.textContent = m.name;
      btn.onclick = () => setSeqMode(m.id);
      container.appendChild(btn);
    });
  } else {
    [['ordered','1. לפי הסדר'],['free','2. אקראי'],['game','3. משחק']].forEach(([id,label],i) => {
      const btn = document.createElement('button');
      btn.className = 'mode-btn' + (gameMode === id ? ' active' : '');
      btn.id = 'btn-' + id;
      btn.textContent = label;
      btn.onclick = () => setMode(id);
      container.appendChild(btn);
    });
  }
}

function setSeqMode(mode) {
  currentSeqMode = mode;
  buildModeToggle();
  buildLevelGrid();
}

function buildLevelGrid() {
  const grid = document.getElementById('level-grid');
  if (!grid) return;
  grid.innerHTML = '';

  if (STAGE === 'melody') {
    if (currentSeqMode === 'random') {
      // Show string selection for random sequences
      const descs = ['מי גבוה','סי','סול','רה','לה','מי נמוך'];
      for (let i = 1; i <= 6; i++) {
        const isUnlocked = UNLOCKED_STRINGS.includes(i);
        const btn = document.createElement('button');
        btn.className = 'lvl-btn' + (isUnlocked ? '' : ' locked');
        btn.innerHTML = '<span class="sname">' + (isUnlocked ? '' : '<span class="lock-icon">🔒</span> ') + 'מיתר ' + i + '</span><span class="sdesc">' + descs[i-1] + '</span>';
        if (isUnlocked) btn.onclick = () => startRandomSequence(i);
        grid.appendChild(btn);
      }
      if (UNLOCKED_STRINGS.length > 1) {
        const allBtn = document.createElement('button');
        allBtn.className = 'lvl-btn all-btn';
        allBtn.innerHTML = '<span class="sname">🎲 כל המיתרים</span><span class="sdesc">תיבה אקראית מכל המיתרים</span>';
        allBtn.onclick = () => startRandomSequence(0);
        grid.appendChild(allBtn);
      }
    } else {
      // Show one big start button per melody
      const melody = MELODIES.find(m => m.id === currentSeqMode);
      if (melody) {
        const btn = document.createElement('button');
        btn.className = 'lvl-btn all-btn';
        btn.innerHTML = '<span class="sname">' + melody.name + '</span><span class="sdesc">' + melody.desc + ' — ' + melody.notes.length + ' תווים</span>';
        btn.onclick = () => startSequence(melody.notes, melody.name);
        grid.appendChild(btn);
      }
    }
    return;
  }

  // Basic stage — original string selection
  const descs = ['מי גבוה','סי','סול','רה','לה','מי נמוך'];
  for (let i = 1; i <= 6; i++) {
    const isUnlocked = UNLOCKED_STRINGS.includes(i);
    const btn = document.createElement('button');
    btn.className = 'lvl-btn' + (isUnlocked ? '' : ' locked');
    btn.innerHTML = '<span class="sname">' + (isUnlocked ? '' : '<span class="lock-icon">🔒</span> ') + 'מיתר ' + i + '</span><span class="sdesc">' + descs[i-1] + '</span>';
    if (isUnlocked) btn.onclick = () => startLevel(i);
    grid.appendChild(btn);
  }
  if (UNLOCKED_STRINGS.length > 1) {
    const allBtn = document.createElement('button');
    allBtn.className = 'lvl-btn all-btn';
    const label = UNLOCKED_STRINGS.length === 6 ? 'כל המיתרים' : 'מיתרים ' + UNLOCKED_STRINGS.join(', ');
    allBtn.innerHTML = '<span class="sname">⚔️ ' + label + '</span><span class="sdesc">שלב את כל המיתרים שנלמדו</span>';
    allBtn.onclick = () => startLevel(0);
    grid.appendChild(allBtn);
  }
}

// index 0=C, 1=C#, 2=D, 3=D#, 4=E, 5=F, 6=F#, 7=G, 8=G#, 9=A, 10=A#, 11=B

// ═══════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════

function midiNote(midi)       { return HE_NOTES[((midi % 12) + 12) % 12]; }
function freqToMidi(f)        { return Math.round(12 * Math.log2(f / 440) + 69); }
function getNote(str, fret)   { return midiNote(OPEN_MIDI[str - 1] + fret); }

function displayNoteName(target) {
  if (!target) return '—';
  if (target.fret === 12) return target.name + ' גבוה';
  return target.name;
}

function activeStrings() {
  return currentLevel === 0 ? UNLOCKED_STRINGS : [currentLevel];
}

function randomTarget() {
  const strs = activeStrings();
  const s = strs[Math.floor(Math.random() * strs.length)];
  const f = Math.floor(Math.random() * (MAX_FRET + 1));
  const midi = OPEN_MIDI[s - 1] + f;
  return { name: midiNote(midi), string: s, fret: f, midi };
}

// All positions of a note name on given strings (frets 0-12)
function notePositions(name, strings) {
  const res = [];
  strings.forEach(s => {
    for (let f = 0; f <= MAX_FRET; f++) {
      if (getNote(s, f) === name) res.push({ s, f });
    }
  });
  return res;
}


// ═══════════════════════════════════════════════
//  STAFF NOTATION
// ═══════════════════════════════════════════════

// Diatonic letter: C=0 D=1 E=2 F=3 G=4 A=5 B=6
const MIDI_CLS_TO_LETTER = {0:0, 2:1, 4:2, 5:3, 7:4, 9:5, 11:6};

function midiToStaffStep(midi) {
  const letter = MIDI_CLS_TO_LETTER[midi % 12];
  if (letter === undefined) return null;
  const octave = Math.floor(midi / 12) - 1;
  return (octave * 7 + letter) - 30; // 30 = E4 diatonic index
}

// ── Treble clef via Canvas ──────────────────────────────────────────────────
// Chromium does not expose CSS web fonts to inline SVG <text> elements.
// Canvas 2D context does use CSS web fonts, so we rasterize the clef there
// and embed it as a <image> in the SVG.
//
// Font math: font-size = 40*S, baseline at canvas y = 50*S
//   → one staff space in canvas = 10*S px  (matches LINE_GAP=10 in SVG)
//   → image placed at SVG y = BOTTOM_Y - 50  so baseline lands on BOTTOM_Y
//   → G line (2nd from bottom) = baseline - 1 space = BOTTOM_Y - 10 = 78 ✓
let _clefDataURL = null;

function _makeClefDataURL() {
  try {
    const S = 2; // 2× for crisp anti-aliasing
    const canvas = document.createElement('canvas');
    canvas.width = 50 * S; canvas.height = 100 * S;
    const ctx = canvas.getContext('2d');
    ctx.font = `normal ${40*S}px "Noto Music","Segoe UI Symbol","Symbola",serif`;
    ctx.fillStyle = '#333333';
    ctx.fillText(String.fromCodePoint(0x1D11E), 2, 50 * S);
    return canvas.toDataURL();
  } catch(e) { return null; }
}

// First pass — immediately (may use a fallback font if Noto not yet loaded)
_clefDataURL = _makeClefDataURL();

// Second pass — once all fonts are confirmed loaded
document.fonts.ready.then(() => {
  _clefDataURL = _makeClefDataURL();
  const svgEl2 = document.getElementById('staff-svg');
  if (svgEl2 && svgEl2.style.display !== 'none' && targetNote && NOTATION !== 'none') {
    _renderStaff(svgEl2, targetNote);
  }
});

function drawStaff(target) {
  const el = document.getElementById('staff-svg');
  if (!el || NOTATION === 'none') return;
  _renderStaff(el, target);
}

function _renderStaff(el, target) {
  el.innerHTML = '';

  const W = (gameMode === 'sequence' && seqNotes.length > 0) ? 340 : 260, H = 130;
  el.setAttribute('viewBox', `0 0 ${W} ${H}`);

  const LINE_GAP = 10;
  const STEP     = LINE_GAP / 2;
  const LX1 = 8, LX2 = W - 10;
  const BOTTOM_Y = 88;

  // Staff lines
  for (let i = 0; i < 5; i++) {
    const y = BOTTOM_Y - i * LINE_GAP;
    el.appendChild(svgEl('line', {x1:LX1, y1:y, x2:LX2, y2:y, stroke:'#666', 'stroke-width':1}));
  }

  // Treble clef image (canvas-rendered)
  if (_clefDataURL) {
    el.appendChild(svgEl('image', {
      x: '2', y: String(BOTTOM_Y - 50),
      width: '50', height: '100',
      href: _clefDataURL,
      preserveAspectRatio: 'xMinYMin meet'
    }));
  }

  // ── Multi-note display for sequence mode ──────────────────────────────────
  if (gameMode === 'sequence' && seqNotes.length > 0) {
    const N          = seqNotes.length;
    const noteStart  = LX1 + 56;          // leave room for treble clef (~x=52)
    const noteArea   = LX2 - noteStart;
    const spacing    = noteArea / N;
    const rx         = Math.max(3.5, Math.min(6, spacing * 0.22));
    const ry         = rx * 0.74;

    seqNotes.forEach((note, i) => {
      const step2 = midiToStaffStep(note.midi + 12);
      if (step2 === null) return;
      const nx = noteStart + i * spacing + spacing * 0.5;
      const ny = BOTTOM_Y - step2 * STEP;
      const isCurrent = (i === seqIdx);
      const isPast    = (i < seqIdx);
      const isHalf    = !!note.half;

      // Ledger lines
      for (let s = -2; s >= step2; s -= 2) {
        const ly = BOTTOM_Y - s * STEP;
        el.appendChild(svgEl('line', {x1:nx-rx-5, y1:ly, x2:nx+rx+5, y2:ly, stroke:'#888', 'stroke-width':0.8}));
      }
      for (let s = 10; s <= step2; s += 2) {
        const ly = BOTTOM_Y - s * STEP;
        el.appendChild(svgEl('line', {x1:nx-rx-5, y1:ly, x2:nx+rx+5, y2:ly, stroke:'#888', 'stroke-width':0.8}));
      }

      // Highlight ring for current
      if (isCurrent) {
        el.appendChild(svgEl('ellipse', {
          cx:nx, cy:ny, rx:rx+4, ry:ry+3,
          fill:'rgba(245,166,35,0.22)', stroke:'#f5a623', 'stroke-width':1.4,
          transform:`rotate(-15 ${nx} ${ny})`
        }));
      }

      // Note head — filled for quarter, open (hollow) for half
      if (isHalf) {
        const headStroke = isPast ? '#b0a898' : '#1a1a1a';
        el.appendChild(svgEl('ellipse', {
          cx:nx, cy:ny, rx, ry,
          fill:'#f5f5f0', stroke:headStroke, 'stroke-width': String(Math.max(1, rx*0.32)),
          transform:`rotate(-15 ${nx} ${ny})`
        }));
      } else {
        const headFill = isPast ? '#b0a898' : '#1a1a1a';
        el.appendChild(svgEl('ellipse', {
          cx:nx, cy:ny, rx, ry,
          fill: headFill, transform:`rotate(-15 ${nx} ${ny})`
        }));
      }

      // Stem
      const stemUp2 = step2 < 4;
      const sw = Math.max(1, rx * 0.28);
      if (stemUp2) {
        el.appendChild(svgEl('line', {x1:nx+rx-0.5, y1:ny-1, x2:nx+rx-0.5, y2:ny-28, stroke: isPast?'#b0a898':'#1a1a1a', 'stroke-width':sw}));
      } else {
        el.appendChild(svgEl('line', {x1:nx-rx+0.5, y1:ny+1, x2:nx-rx+0.5, y2:ny+28, stroke: isPast?'#b0a898':'#1a1a1a', 'stroke-width':sw}));
      }

      // ✓ for past notes
      if (isPast) {
        el.appendChild(svgEl('text', {
          x:String(nx), y:String(ny - (stemUp2 ? 33 : -35)),
          'text-anchor':'middle', fill:'#4caf50',
          'font-size':'9', 'font-weight':'bold'
        }, '✓'));
      }
    });

    // Bar lines — beat-based (half note = 2 beats, quarter = 1 beat, bar = 4 beats)
    {
      let beats = 0;
      for (let i = 0; i < N - 1; i++) {
        beats += seqNotes[i].half ? 2 : 1;
        if (beats % 4 === 0) {
          const nx_curr = noteStart + i * spacing + spacing * 0.5;
          const nx_next = noteStart + (i+1) * spacing + spacing * 0.5;
          const bx = (nx_curr + nx_next) / 2;
          el.appendChild(svgEl('line', {
            x1:String(bx), y1:String(BOTTOM_Y - 4*LINE_GAP - 2),
            x2:String(bx), y2:String(BOTTOM_Y + 2),
            stroke:'#555', 'stroke-width':'1.2'
          }));
        }
      }
    }
    // Final bar line (double)
    el.appendChild(svgEl('line', {
      x1:String(LX2-4), y1:String(BOTTOM_Y - 4*LINE_GAP - 2),
      x2:String(LX2-4), y2:String(BOTTOM_Y + 2),
      stroke:'#555', 'stroke-width':'1.2'
    }));
    el.appendChild(svgEl('line', {
      x1:String(LX2-1), y1:String(BOTTOM_Y - 4*LINE_GAP - 2),
      x2:String(LX2-1), y2:String(BOTTOM_Y + 2),
      stroke:'#333', 'stroke-width':'2.5'
    }));

    return;
  }

  // ── Single-note display ───────────────────────────────────────────────────
  if (!target) return;

  const step = midiToStaffStep(target.midi + 12); // guitar sounds 8va bassa
  if (step === null) return;

  const noteY = BOTTOM_Y - step * STEP;
  const noteX = LX1 + (LX2 - LX1) * 0.62;

  for (let s = -2; s >= step; s -= 2) {
    const ly = BOTTOM_Y - s * STEP;
    el.appendChild(svgEl('line', {x1:noteX-14, y1:ly, x2:noteX+14, y2:ly, stroke:'#666', 'stroke-width':1}));
  }
  for (let s = 10; s <= step; s += 2) {
    const ly = BOTTOM_Y - s * STEP;
    el.appendChild(svgEl('line', {x1:noteX-14, y1:ly, x2:noteX+14, y2:ly, stroke:'#666', 'stroke-width':1}));
  }

  el.appendChild(svgEl('ellipse', {
    cx: noteX, cy: noteY, rx: 6.5, ry: 4.8,
    fill: '#1a1a1a', transform: `rotate(-15 ${noteX} ${noteY})`
  }));

  const stemUp = step < 4;
  if (stemUp) {
    el.appendChild(svgEl('line', {x1:noteX+6, y1:noteY-2, x2:noteX+6, y2:noteY-32, stroke:'#1a1a1a', 'stroke-width':1.6}));
  } else {
    el.appendChild(svgEl('line', {x1:noteX-6, y1:noteY+2, x2:noteX-6, y2:noteY+32, stroke:'#1a1a1a', 'stroke-width':1.6}));
  }
}


// ═══════════════════════════════════════════════
//  NATURAL NOTES & ORDERED SEQUENCE
// ═══════════════════════════════════════════════

const NATURAL_CLASSES = new Set([0, 2, 4, 5, 7, 9, 11]); // C D E F G A B

function isNatural(midi) {
  return NATURAL_CLASSES.has(((midi % 12) + 12) % 12);
}

function randomNaturalTarget() {
  const strs = activeStrings();
  for (let attempt = 0; attempt < 200; attempt++) {
    const s = strs[Math.floor(Math.random() * strs.length)];
    const f = Math.floor(Math.random() * (Math.min(MAX_FRET, MAX_FRET_PARAM) + 1));
    const midi = OPEN_MIDI[s - 1] + f;
    if (!isNatural(midi)) continue;
    const t = { name: midiNote(midi), string: s, fret: f, midi };
    if (!targetNote || t.name !== targetNote.name) return t;
  }
  // Fallback: first natural on first string
  const s = strs[0];
  const midi = OPEN_MIDI[s - 1];
  return { name: midiNote(midi), string: s, fret: 0, midi };
}

function buildOrderedSeq() {
  orderedSeq = [];
  orderedIdx = 0;

  // Collect all natural notes across all active strings
  const allNotes = [];
  activeStrings().forEach(s => {
    for (let f = 0; f <= Math.min(MAX_FRET, MAX_FRET_PARAM); f++) {
      const midi = OPEN_MIDI[s - 1] + f;
      if (isNatural(midi)) allNotes.push({ name: midiNote(midi), string: s, fret: f, midi });
    }
  });

  // Sort by pitch (ascending), deduplicate — keep lowest fret for same pitch
  allNotes.sort((a, b) => a.midi !== b.midi ? a.midi - b.midi : a.fret - b.fret);
  const seen = new Set();
  const asc = [];
  allNotes.forEach(n => {
    if (!seen.has(n.midi)) { seen.add(n.midi); asc.push(n); }
  });

  orderedAscLen = asc.length;
  // Ascending then descending (full scale up and back down)
  orderedSeq = [...asc, ...[...asc].reverse()];
}

function updateOrderedHUD() {
  const numEl   = document.getElementById('ordered-num');
  const totEl   = document.getElementById('ordered-total');
  const dirEl   = document.getElementById('ordered-dir');
  if (!numEl) return;
  numEl.textContent = orderedIdx + 1;
  totEl.textContent = orderedSeq.length;
  // Direction: first half = ascending, second half = descending
  const isAsc = orderedIdx < orderedAscLen;
  dirEl.textContent = isAsc ? '↑ עולה' : '↓ יורד';
}

function showOrderedComplete() {
  stopMic();
  document.getElementById('game-screen').style.display    = 'none';
  document.getElementById('ordered-hud').style.display    = 'none';
  document.getElementById('free-hud').style.display       = 'none';

  document.getElementById('results-screen').style.display = 'block';

  document.getElementById('res-bad').textContent = scoreBad;
  document.getElementById('res-emoji').textContent = scoreOk >= orderedSeq.length * 0.85 ? '🌟' : '💪';
  document.getElementById('res-title').textContent =
    scoreOk >= orderedSeq.length * 0.85 ? 'מעולה! סיימת את התרגיל!' : 'סיימת! שווה לתרגל שוב';
  document.getElementById('res-replay-btn').textContent = '🔄 נגן שוב';
  document.getElementById('res-next-btn').style.display = 'inline-block';
}

// ═══════════════════════════════════════════════

function startLevel(lvl) {
  currentLevel  = lvl;
  scoreOk       = 0;
  scoreBad      = 0;
  gameNotesDone = 0;
  freeNotesDone = 0;
  updateScore();

  document.getElementById('level-screen').style.display    = 'none';
  document.getElementById('results-screen').style.display  = 'none';
  document.getElementById('game-screen').style.display     = 'block';
  document.getElementById('game-hud').style.display     = gameMode === 'game'    ? 'flex' : 'none';
  document.getElementById('ordered-hud').style.display  = gameMode === 'ordered' ? 'flex' : 'none';
  document.getElementById('free-hud').style.display     = gameMode === 'free'    ? 'flex' : 'none';
  if (gameMode === 'ordered') { buildOrderedSeq(); updateOrderedHUD(); }
  if (gameMode === 'free') { const el = document.getElementById('free-num'); if (el) el.textContent = 1; }
  document.getElementById('staff-svg').style.display = NOTATION !== 'none' ? 'block' : 'none';

  const lbl = lvl === 0 ? 'כל המיתרים' : STRING_LABELS[lvl - 1];
  document.getElementById('level-label').textContent = lbl;

  if (gameMode === 'game') updateGameHUD();
  nextNote();
  drawBoard(null, null);

  // Auto-start mic — the level button click counts as a user gesture
  if (!listening) startMic();
}

function startRandomSequence(lvl) {
  currentLevel = lvl;
  const strs   = lvl === 0 ? UNLOCKED_STRINGS : [lvl];
  const notes  = [];
  let lastMidi = -1;
  for (let i = 0; i < 4; i++) {
    let t, attempts = 0;
    do {
      const s = strs[Math.floor(Math.random() * strs.length)];
      const f = Math.floor(Math.random() * (Math.min(MAX_FRET, MAX_FRET_PARAM) + 1));
      const midi = OPEN_MIDI[s - 1] + f;
      if (!isNatural(midi)) continue;
      t = { midi, string: s, fret: f, name: midiNote(midi) };
      attempts++;
    } while (t.midi === lastMidi && attempts < 100);
    if (t) { lastMidi = t.midi; notes.push(t); }
  }
  startSequence(notes, '🎲 תיבה אקראית');
}

function startSequence(notes, title) {
  seqNotes = notes.map(n => ({...n}));
  seqIdx   = 0;
  scoreOk  = 0;
  scoreBad = 0;
  updateScore();
  gameMode = 'sequence';

  document.getElementById('level-screen').style.display   = 'none';
  document.getElementById('results-screen').style.display = 'none';
  document.getElementById('game-screen').style.display    = 'block';
  document.getElementById('game-hud').style.display       = 'none';
  document.getElementById('ordered-hud').style.display    = 'none';
  document.getElementById('free-hud').style.display       = 'none';
  document.getElementById('seq-hud').style.display        = 'flex';
  document.getElementById('seq-total').textContent        = seqNotes.length;
  document.getElementById('staff-svg').style.display      = NOTATION !== 'none' ? 'block' : 'none';
  document.getElementById('level-label').textContent      = title || '';

  nextNote();
  drawBoard(null, null);
  if (!listening) startMic();
}

function showSeqResults() {
  stopMic();
  document.getElementById('game-screen').style.display    = 'none';
  document.getElementById('seq-hud').style.display        = 'none';
  document.getElementById('results-screen').style.display = 'block';
  document.getElementById('res-ok').textContent  = scoreOk;
  document.getElementById('res-bad').textContent = scoreBad;
  const total = seqNotes.length;
  document.getElementById('res-of-ok').textContent  = '/' + total;
  document.getElementById('res-of-bad').textContent = '';
  const pct = scoreOk / total;
  const emoji = pct === 1 ? '🌟' : pct >= 0.8 ? '🎸' : '💪';
  const title = pct === 1 ? 'מושלם! ניגנת את כל הרצף!' : pct >= 0.8 ? 'כמעט מושלם!' : 'שווה לתרגל שוב!';
  document.getElementById('res-emoji').textContent = emoji;
  document.getElementById('res-title').textContent = title;
  document.getElementById('res-replay-btn').textContent    = '🔄 נגן שוב';
  document.getElementById('res-next-btn').style.display    = 'none';
}

function nextNote() {
  let t;
  if (gameMode === 'sequence') {
    if (seqIdx >= seqNotes.length) { showSeqResults(); return; }
    t = seqNotes[seqIdx];
    document.getElementById('seq-num').textContent = seqIdx + 1;
  } else if (gameMode === 'ordered') {
    if (orderedIdx >= orderedSeq.length) { showOrderedComplete(); return; }
    t = orderedSeq[orderedIdx++];
    updateOrderedHUD();
  } else {
    const pick = (gameMode === 'free' || gameMode === 'game') ? randomNaturalTarget : (NATURALS_ONLY ? randomNaturalTarget : randomTarget);
    do { t = pick(); } while (targetNote && t.name === targetNote.name);
  }
  targetNote = t;

  cooldown = false;
  confirmCount = 0;
  wrongCount   = 0;
  lastWrong    = -1;
  graceFr      = GRACE_FR;

  if (NOTATION === 'only' || gameMode === 'sequence') {
    document.getElementById('target-note').textContent = '';
    document.getElementById('target-fret').textContent = '';
    document.getElementById('note-name-side').textContent = '';
  } else {
    document.getElementById('target-note').textContent = displayNoteName(targetNote);
    document.getElementById('target-fret').textContent = targetNote.fret === 0 ? 'פתוח' : 'סריג ' + targetNote.fret;
    document.getElementById('note-name-side').textContent = displayNoteName(targetNote);
  }
  drawStaff(targetNote);
  document.getElementById('feedback-msg').textContent  = '';
  if (document.getElementById('target-fret')) document.getElementById('target-fret').textContent = '';
  document.getElementById('feedback-msg').className    = '';
  document.getElementById('detected-display').textContent = '';

  drawBoard(null, null); // hide dots until played
  if (gameMode === 'sequence') {
    document.querySelector('.prompt-body').classList.remove('layout-basic');
    document.getElementById('string-indicator').style.display = 'none';
    document.getElementById('note-name-side').style.display = 'none';
    document.getElementById('note-display').style.flex = '1 1 100%';
  } else {
    document.querySelector('.prompt-body').classList.add('layout-basic');
    document.getElementById('note-name-side').style.display = '';
    document.getElementById('note-display').style.flex = '';
    updateStringIndicator();
  }
  if (gameMode === 'game') startGameTimer();
}

function onCorrect() {
  if (cooldown) return;
  cooldown = true;
  scoreOk++;
  updateScore();
  if (gameMode !== 'sequence') playCorrect();

  const el = document.getElementById('target-note');
  el.classList.add('celebrate');
  setTimeout(() => el.classList.remove('celebrate'), 400);

  showFeedback('✅ נכון! 🎉', 'fb-ok');
  drawBoard('correct', null);
  if (gameMode === 'sequence') {
    seqIdx++;
    if (seqIdx >= seqNotes.length) {
      setTimeout(showSeqResults, 1200);
    } else {
      setTimeout(nextNote, 900);
    }
  } else if (gameMode === 'game') {
    clearGameTimer();
    advanceGame(900);
  } else if (gameMode === 'ordered') {
    setTimeout(nextNote, 1100);
  } else {
    // free mode
    freeNotesDone++;
    const freeNumEl = document.getElementById('free-num');
    if (freeNumEl) freeNumEl.textContent = Math.min(freeNotesDone + 1, FREE_TOTAL);
    if (freeNotesDone >= FREE_TOTAL) {
      setTimeout(showFreeResults, 1200);
    } else {
      setTimeout(nextNote, 1600);
    }
  }
}

function onWrong(played) {
  if (cooldown) return;
  // Show feedback + correct position, but don't advance — let them keep trying
  cooldown = true;
  scoreBad++;
  updateScore();
  playWrong();
  showFeedback(`❌ נגנת ${played} — הנה המיקום הנכון:`, 'fb-bad');
  drawBoard('wrong', played);

  if (gameMode === 'game') {
    clearGameTimer();
    advanceGame(2000);
  } else {
    // sequence / ordered / free: show correct position, then retry
    setTimeout(() => {
      cooldown   = false;
      wrongCount = 0;
      lastWrong  = -1;
      graceFr    = GRACE_FR;
      showFeedback('', '');
      drawBoard(null, null);
    }, 3000);
  }
}

function showFeedback(msg, cls) {
  const el = document.getElementById('feedback-msg');
  el.textContent = msg;
  el.className   = cls;
}

function updateScore() {
  document.getElementById('sc-ok').textContent  = scoreOk;
  document.getElementById('sc-bad').textContent = scoreBad;
}

function backToMenu() {
  stopMic();
  clearGameTimer();
  document.getElementById('game-screen').style.display    = 'none';
  document.getElementById('ordered-hud').style.display    = 'none';
  document.getElementById('free-hud').style.display       = 'none';
  document.getElementById('seq-hud').style.display         = 'none';
  document.getElementById('staff-svg').style.display       = 'none';
  document.getElementById('results-screen').style.display = 'none';
  document.getElementById('level-screen').style.display   = 'block';
  targetNote = null;
  seqNotes = []; seqIdx = 0;
}

// ═══════════════════════════════════════════════
//  FRETBOARD DRAWING
// ═══════════════════════════════════════════════

function svgEl(tag, attrs, text) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  Object.entries(attrs).forEach(([k,v]) => el.setAttribute(k, v));
  if (text !== undefined) el.textContent = text;
  return el;
}

function drawBoard(state, played) {
  // state: null = hide dots, 'correct' = green, 'wrong' = show correct in green
  const svg = document.getElementById('fb');
  svg.innerHTML = '';

  // Responsive: scale fretboard to fit container
  const totalW = FB.x0 + FB.w + 16;
  const totalH = FB.y0 + FB.h + 28;
  const containerW = (document.getElementById('fretboard-wrap').clientWidth || totalW) - 20;
  const scale = Math.min(1, containerW / totalW);
  svg.setAttribute('viewBox', `0 0 ${totalW} ${totalH}`);
  svg.style.width  = Math.round(totalW * scale) + 'px';
  svg.style.height = Math.round(totalH * scale) + 'px';

  const fW = FB.w / MAX_FRET;                  // fret width
  const sS = FB.h / 5;                         // string spacing

  // Wood background
  svg.appendChild(svgEl('rect', { x:FB.x0-FB.nutW, y:FB.y0-4, width:FB.w+FB.nutW+4, height:FB.h+8,
    rx:5, fill:'#b8885a' }));
  svg.appendChild(svgEl('rect', { x:FB.x0, y:FB.y0, width:FB.w, height:FB.h,
    fill:'#c9995f' }));

  // Inlay markers
  [3,5,7,9,12].forEach(f => {
    const cx = FB.x0 + (f - 0.5) * fW;
    if (f === 12) {
      [-1,1].forEach(d => svg.appendChild(svgEl('circle',
        { cx, cy: FB.y0 + FB.h/2 + d*sS, r:5, fill:'rgba(0,0,0,0.18)' })));
    } else {
      svg.appendChild(svgEl('circle',
        { cx, cy: FB.y0 + FB.h/2, r:5, fill:'rgba(0,0,0,0.18)' }));
    }
  });

  // Fret wires
  for (let f = 1; f <= MAX_FRET; f++) {
    const x = FB.x0 + f * fW;
    svg.appendChild(svgEl('line', { x1:x, y1:FB.y0, x2:x, y2:FB.y0+FB.h,
      stroke:'#7a5c3a', 'stroke-width': f === 12 ? 3 : 2 }));
  }

  // Nut
  svg.appendChild(svgEl('rect', { x:FB.x0-FB.nutW, y:FB.y0-2, width:FB.nutW, height:FB.h+4,
    fill:'#f0ede0', rx:2 }));

  // Strings
  for (let s = 0; s < 6; s++) {
    const y = FB.y0 + s * sS;
    const sw = 0.8 + s * 0.55;
    svg.appendChild(svgEl('line', { x1:FB.x0-FB.nutW, y1:y, x2:FB.x0+FB.w, y2:y,
      stroke:'#2a1a0a', 'stroke-width': sw }));
  }

  // Fret numbers
  for (let f = 0; f <= MAX_FRET; f++) {
    const x = f === 0 ? FB.x0 - FB.nutW/2 : FB.x0 + (f-0.5)*fW;
    svg.appendChild(svgEl('text',
      { x, y: FB.y0+FB.h+20, 'text-anchor':'middle', fill:'#8a8078', 'font-size':11, 'font-family':'monospace' },
      f.toString()));
  }

  // String labels (left)
  for (let s = 0; s < 6; s++) {
    svg.appendChild(svgEl('text', {
      x: FB.x0-FB.nutW-6, y: FB.y0+s*sS+4,
      'text-anchor':'end', fill:'#7a6a5a', 'font-size':11, 'font-family':'monospace'
    }, STRING_SHORT[s]));
  }

  // ── Guide dots: natural note positions on current string (ordered mode) ──
  if (gameMode === 'ordered' && targetNote) {
    for (let f = 0; f <= Math.min(MAX_FRET, MAX_FRET_PARAM); f++) {
      const midi = OPEN_MIDI[targetNote.string - 1] + f;
      if (!isNatural(midi)) continue;
      const cx = f === 0 ? FB.x0 - FB.nutW/2 : FB.x0 + (f - 0.5) * fW;
      const cy = FB.y0 + (targetNote.string - 1) * sS;
      // Skip the target position itself (will be drawn as main dot)
      if (f === targetNote.fret && state) continue;
      svg.appendChild(svgEl('circle', { cx, cy, r: 9,
        fill: 'rgba(255,255,255,0.82)', stroke: 'rgba(180,160,130,0.5)', 'stroke-width': 1.2 }));
      svg.appendChild(svgEl('text', {
        x: cx, y: cy + 3.5, 'text-anchor': 'middle',
        fill: 'rgba(90,70,50,0.75)', 'font-size': 8,
        'font-weight': 'bold', 'font-family': 'Arial'
      }, midiNote(midi)));
    }
  }

  // ── Dots ── always show only the single target position
  if (state && targetNote) {
    const positions = [{ s: targetNote.string, f: targetNote.fret }];

    positions.forEach(({ s, f }) => {
      const cx = f === 0 ? FB.x0 - FB.nutW/2 : FB.x0 + (f-0.5)*fW;
      const cy = FB.y0 + (s-1)*sS;

      const fill = state === 'correct' ? '#4caf50' : '#4caf50';  // both show green correct pos
      const shadow = state === 'correct' ? 'rgba(76,175,80,0.6)' : 'rgba(76,175,80,0.5)';

      // glow ring
      svg.appendChild(svgEl('circle', { cx, cy, r:16,
        fill:shadow, opacity:0.45 }));
      // main dot
      svg.appendChild(svgEl('circle', { cx, cy, r:12, fill }));
      // note name
      svg.appendChild(svgEl('text', {
        x:cx, y:cy+4, 'text-anchor':'middle', fill:'white',
        'font-size':9, 'font-weight':'bold', 'font-family':'Arial'
      }, targetNote.name));

      // icon badge
      const icon = state === 'correct' ? '✓' : '!';
      const iconFill = state === 'correct' ? '#fff' : '#fff';
      svg.appendChild(svgEl('circle', { cx: cx+14, cy: cy-14, r:8,
        fill: state === 'correct' ? '#2e7d32' : '#e53935' }));
      svg.appendChild(svgEl('text', {
        x: cx+14, y: cy-10, 'text-anchor':'middle', fill:iconFill,
        'font-size':10, 'font-weight':'bold'
      }, icon));
    });
  }
}

// ═══════════════════════════════════════════════

function playCorrect() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    // C5 → E5 → G5  (major chord arpeggio — bright and pleasant)
    [[523.25, 0, 0.18], [659.25, 0.16, 0.22], [783.99, 0.30, 0.38]].forEach(([f, t, dur]) => {
      const osc = ctx.createOscillator();
      const g   = ctx.createGain();
      osc.connect(g); g.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.value = f;
      g.gain.setValueAtTime(0, ctx.currentTime + t);
      g.gain.linearRampToValueAtTime(0.2, ctx.currentTime + t + 0.03);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + dur);
      osc.start(ctx.currentTime + t);
      osc.stop(ctx.currentTime + t + dur + 0.05);
    });
    setTimeout(() => ctx.close(), 1200);
  } catch(e) {}
}

function playWrong() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    // Soft descending tone — 260→140 Hz, quiet and low
    const osc = ctx.createOscillator();
    const g   = ctx.createGain();
    osc.connect(g); g.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(260, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(140, ctx.currentTime + 0.38);
    g.gain.setValueAtTime(0.2, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.42);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.48);
    setTimeout(() => ctx.close(), 800);
  } catch(e) {}
}

// ═══════════════════════════════════════════════
//  AUDIO / PITCH DETECTION
// ═══════════════════════════════════════════════

async function toggleMic() {
  if (listening) { stopMic(); }
  else           { await startMic(); }
}

async function startMic() {
  try {
    micStream = await navigator.mediaDevices.getUserMedia({ audio:true, video:false });
    audioCtx  = new (window.AudioContext || window.webkitAudioContext)();
    analyser  = audioCtx.createAnalyser();
    analyser.fftSize = 2048; // smaller = faster on mobile
    const src = audioCtx.createMediaStreamSource(micStream);
    src.connect(analyser);
    // iOS Safari: resume AudioContext after user gesture
    if (audioCtx.state === 'suspended') await audioCtx.resume();
    listening = true;
    const btn = document.getElementById('mic-btn');
    btn.textContent = '🔴 עצור האזנה';
    btn.classList.add('on');
    detectLoop();
  } catch(e) {
    alert('לא ניתן לגשת למיקרופון.\nאנא אשר הרשאה בדפדפן ונסה שוב.');
  }
}

function stopMic() {
  listening = false;
  if (raf) cancelAnimationFrame(raf);
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
  if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
  analyser = null;
  document.getElementById('mic-btn').textContent = '🎤 מיקרופון';
  document.getElementById('mic-btn').classList.remove('on');
  document.getElementById('vol-bar').style.width = '0%';
}

function detectLoop() {
  if (!listening || !analyser) return;

  const buf = new Float32Array(analyser.fftSize);
  analyser.getFloatTimeDomainData(buf);

  // RMS volume
  let rms = 0;
  for (let i = 0; i < buf.length; i++) rms += buf[i]*buf[i];
  rms = Math.sqrt(rms / buf.length);

  document.getElementById('vol-bar').style.width = Math.min(rms * 400, 100) + '%';

  const freq = autoCorrelate(buf, audioCtx.sampleRate);
  const LOUD = rms > 0.004; // lowered for better low-string detection

  if (freq > 0 && LOUD && targetNote) {
    const detMidi = freqToMidi(freq);
    const detName = midiNote(detMidi);
    // Exact MIDI match — Math.round already gives ~±25 cent natural tolerance
    const midiMatch = detMidi === targetNote.midi;
    // Same note name but wrong octave?
    const sameNameWrongOctave = !midiMatch && (detName === targetNote.name);

    let displayText = `מזוהה: ${detName}`;
    if (sameNameWrongOctave) displayText += ' — אוקטבה שגויה!';
    document.getElementById('detected-display').textContent = displayText;

    if (graceFr > 0) { graceFr--; }
    else if (!cooldown) {
      if (midiMatch) {
        confirmCount++;
        wrongCount = 0; lastWrong = -1;
        if (confirmCount >= CONFIRM_THR) onCorrect();
      } else {
        confirmCount = 0;
        if (detMidi === lastWrong) {
          wrongCount++;
          if (wrongCount >= WRONG_THR) onWrong(detName);
        } else {
          lastWrong = detMidi; wrongCount = 1;
        }
      }
    }
  } else if (!LOUD) {
    if (!cooldown) { confirmCount = 0; wrongCount = 0; }
    document.getElementById('detected-display').textContent = '';
  }

  raf = requestAnimationFrame(detectLoop);
}

// Pitch detector — ACF with guitar-range focus, works on mobile (no zero-crossing dependency)
function autoCorrelate(buf, sr) {
  const N = buf.length;

  // RMS check
  let rms = 0;
  for (let i = 0; i < N; i++) rms += buf[i] * buf[i];
  rms = Math.sqrt(rms / N);
  if (rms < 0.002) return -1;

  // DC offset removal — critical for mobile mics
  let mean = 0;
  for (let i = 0; i < N; i++) mean += buf[i];
  mean /= N;
  const sig = new Float32Array(N);
  for (let i = 0; i < N; i++) sig[i] = buf[i] - mean;

  // Guitar frequency range → lag range
  const minLag = Math.max(2, Math.floor(sr / 1320)); // ~1320 Hz max
  const maxLag = Math.min(Math.floor(N / 2) - 1, Math.ceil(sr / 65)); // ~65 Hz min for low E
  const useN   = Math.floor(N * 0.7); // use 70% of buffer — fast enough on mobile

  // Autocorrelation only for lags in guitar range
  const C = new Float32Array(maxLag + 2);
  for (let lag = minLag; lag <= maxLag + 1; lag++) {
    let s = 0;
    const end = useN - lag;
    for (let j = 0; j < end; j++) s += sig[j] * sig[j + lag];
    C[lag] = s;
  }

  // Global max in range
  let maxC = 0;
  for (let lag = minLag; lag <= maxLag; lag++) if (C[lag] > maxC) maxC = C[lag];
  if (maxC < 1e-6) return -1;

  // First local peak ≥ 80% of global max
  // (lowest lag = highest frequency, avoids octave-down errors)
  let bestLag = -1;
  for (let lag = minLag + 1; lag < maxLag; lag++) {
    if (C[lag] >= 0.8 * maxC && C[lag] > C[lag - 1] && C[lag] >= C[lag + 1]) {
      bestLag = lag;
      break;
    }
  }
  if (bestLag < 2 || bestLag >= maxLag) return -1;

  // Parabolic interpolation for precision
  const x1 = C[bestLag-1], x2 = C[bestLag], x3 = C[bestLag+1];
  const a  = (x1 + x3 - 2*x2) / 2;
  const b  = (x3 - x1) / 2;
  const T0 = a !== 0 ? bestLag - b / (2*a) : bestLag;

  const freq = sr / T0;
  return (freq >= 72 && freq <= 1320) ? freq : -1;
}

// ═══════════════════════════════════════════════
//  GAME MODE
// ═══════════════════════════════════════════════

function setMode(mode) {
  gameMode = mode;
  buildModeToggle();
}

function startGameTimer() {
  clearGameTimer();
  gameTimeLeft = GAME_SECS;
  updateTimerDisplay();
  gameInterval = setInterval(() => {
    gameTimeLeft--;
    updateTimerDisplay();
    if (gameTimeLeft <= 0) { clearGameTimer(); onTimeUp(); }
  }, 1000);
}

function clearGameTimer() {
  if (gameInterval) { clearInterval(gameInterval); gameInterval = null; }
}

function onTimeUp() {
  if (cooldown) return;
  cooldown = true;
  scoreBad++;
  updateScore();
  playWrong();
  showFeedback('⏱️ נגמר הזמן — המיקום הנכון:', 'fb-bad');
  drawBoard('wrong', null);
  advanceGame(2000);
}

function advanceGame(delay) {
  gameNotesDone++;
  if (gameNotesDone >= GAME_TOTAL) {
    setTimeout(showResults, delay);
  } else {
    setTimeout(() => { nextNote(); updateGameHUD(); }, delay);
  }
}

function updateGameHUD() {
  const el = document.getElementById('note-num');
  if (el) el.textContent = gameNotesDone + 1;
}

function updateTimerDisplay() {
  const numEl = document.getElementById('timer-num');
  const arcEl = document.getElementById('timer-arc');
  if (!numEl || !arcEl) return;
  numEl.textContent = gameTimeLeft;
  const circ   = 2 * Math.PI * 27;
  const offset = circ * (1 - gameTimeLeft / GAME_SECS);
  arcEl.setAttribute('stroke-dashoffset', offset);
  const col = gameTimeLeft > 6 ? '#3d8c40' : gameTimeLeft > 3 ? '#f5a623' : '#c0392b';
  arcEl.setAttribute('stroke', col);
  numEl.style.color = col;
}

function showFreeResults() {
  stopMic();
  document.getElementById('game-screen').style.display    = 'none';
  document.getElementById('results-screen').style.display = 'block';
  document.getElementById('res-ok').textContent  = scoreOk;
  document.getElementById('res-bad').textContent = scoreBad;
  const pct = scoreOk / (scoreOk + scoreBad);
  let emoji, title;
  if      (scoreBad === 0)  { emoji = '🌟'; title = 'מושלם! אפס טעויות!'; }
  else if (pct >= 0.93)     { emoji = '🌟'; title = 'כמעט מושלם!'; }
  else if (pct >= 0.8)      { emoji = '🎸'; title = 'מצוין! ממשיכים קדימה'; }
  else if (pct >= 0.65)     { emoji = '👍'; title = 'יפה! עוד קצת תרגול'; }
  else                      { emoji = '💪'; title = 'שווה לתרגל שוב!'; }
  document.getElementById('res-emoji').textContent = emoji;
  document.getElementById('res-title').textContent = title;
  document.getElementById('res-replay-btn').textContent = '🔄 נגן שוב';
  document.getElementById('res-next-btn').style.display = 'inline-block';
  document.getElementById('res-of-ok').textContent  = '/' + FREE_TOTAL;
  document.getElementById('res-of-bad').textContent = '';
}

function showResults() {
  stopMic();
  clearGameTimer();
  document.getElementById('game-screen').style.display    = 'none';
  document.getElementById('results-screen').style.display = 'block';
  document.getElementById('res-ok').textContent  = scoreOk;
  document.getElementById('res-bad').textContent = scoreBad;
  document.getElementById('res-replay-btn').textContent = '⚡ שחק שוב';
  document.getElementById('res-next-btn').style.display = 'none';
  document.getElementById('res-of-ok').textContent  = '/' + GAME_TOTAL;
  document.getElementById('res-of-bad').textContent = '/' + GAME_TOTAL;
  let emoji, title;
  if      (scoreBad === 0)  { emoji = '🌟'; title = 'מושלם! אפס טעויות!'; }
  else if (scoreOk === 10) { emoji = '🌟'; title = 'עשרה מתוך עשרה!'; }
  else if (scoreOk >= 8)   { emoji = '🎸'; title = 'מצוין!'; }
  else if (scoreOk >= 6)   { emoji = '👍'; title = 'יפה מאוד!'; }
  else if (scoreOk >= 4)   { emoji = '💪'; title = 'ממשיכים להתאמן!'; }
  else                     { emoji = '🎓'; title = 'שווה לתרגל עוד קצת!'; }
  document.getElementById('res-emoji').textContent = emoji;
  document.getElementById('res-title').textContent = title;
}

function replayGame() {
  document.getElementById('results-screen').style.display = 'none';
  if (gameMode === 'sequence' && seqNotes.length > 0) {
    const savedNotes = seqNotes.slice();
    const savedTitle = document.getElementById('level-label').textContent;
    startSequence(savedNotes, savedTitle);
  } else {
    startLevel(currentLevel);
  }
}

function goNextExercise() {
  // ordered → free, free → game
  const next = gameMode === 'ordered' ? 'free' : 'game';
  document.getElementById('results-screen').style.display = 'none';
  setMode(next);
  startLevel(currentLevel);
}

// ═══════════════════════════════════════════════
//  STRING INDICATOR
// ═══════════════════════════════════════════════

function updateStringIndicator() {
  const svg = document.getElementById('string-indicator');
  if (!svg) return;
  svg.innerHTML = '';

  // Fixed internal coordinate space — CSS/viewBox handles scaling
  const W = 215, H = 122;
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');

  const yStart = 13, yStep = 17;
  const lineX1 = 18, lineX2 = 130;

  svg.appendChild(svgEl('rect', { x:0, y:0, width:W, height:H, rx:10,
    fill:'#f9f5ee', stroke:'#e8e2d8', 'stroke-width':1 }));

  for (let i = 0; i < 6; i++) {
    const y = yStart + i * yStep;
    const isTarget = targetNote && (i + 1) === targetNote.string;
    const col = isTarget ? '#f5a623' : '#c8bfb4';
    const sw  = isTarget ? 3.5 : (0.65 + i * 0.28);

    if (isTarget) {
      svg.appendChild(svgEl('line', {
        x1: lineX1-2, y1: y, x2: lineX2+2, y2: y,
        stroke:'rgba(245,166,35,0.28)', 'stroke-width':12
      }));
    }

    svg.appendChild(svgEl('line', {
      x1:lineX1, y1:y, x2:lineX2, y2:y,
      stroke:col, 'stroke-width':sw
    }));

    if (isTarget) {
      svg.appendChild(svgEl('polygon', {
        points:`${lineX1-11},${y-5} ${lineX1-2},${y} ${lineX1-11},${y+5}`,
        fill:'#f5a623'
      }));
    }

    svg.appendChild(svgEl('text', {
      x: lineX2 + 9, y: y + 4,
      fill: isTarget ? '#c97d0a' : '#8a8078',
      'font-size': isTarget ? 12 : 10,
      'font-weight': isTarget ? 'bold' : 'normal',
      'font-family': 'Segoe UI, Arial'
    }, `${i+1}. ${STRING_HE_FULL[i]}`));
  }
}

// ── init ──
buildModeToggle();
buildLevelGrid();
drawBoard(null, null);
updateStringIndicator();
</script>
